<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skill Exchange | Home</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}
body{
  background:#f4f6f9;
}
/* NAVBAR */
header{
  background:#2563eb;
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
}
.logo{
  font-size:20px;
  font-weight:bold;
}
nav a{
  color:white;
  margin:0 10px;
  text-decoration:none;
  font-size:14px;
}
nav a:hover{
  text-decoration:underline;
}
/* HERO */
.hero{
  text-align:center;
  padding:90px 20px;
  background:#2563eb;
  color:white;
}
.hero h1{
  font-size:40px;
  margin-bottom:10px;
}
.hero p{
  font-size:16px;
  margin-bottom:20px;
}
.hero button{
  padding:12px 18px;
  margin:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:14px;
}
.btn-white{
  background:white;
  color:#2563eb;
}
.btn-outline{
  background:transparent;
  border:2px solid white;
  color:white;
}
.section{
  padding:60px 20px;
  text-align:center;
}
.section h2{
  color:#2563eb;
  margin-bottom:20px;
}
/* FEATURES */
.box-container{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:15px;
}
.box{
  background:white;
  padding:20px;
  width:180px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  font-size:14px;
}
/* SKILLS */
.skill-card{
  display:inline-block;
  background:white;
  padding:15px;
  margin:10px;
  border-radius:10px;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  transition:0.3s;
}
.skill-card:hover{
  transform:scale(1.05);
}
/* POPUP */
.popup{
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:25px;
  border-radius:10px;
  box-shadow:0 5px 20px rgba(0,0,0,0.2);
  text-align:center;
}
.popup button{
  margin-top:10px;
  padding:8px 15px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
/* FOOTER */
footer{
  background:#2563eb;
  color:white;
  text-align:center;
  padding:20px;
  margin-top:40px;
}
</style>
</head>
<body>
<!-- NAVBAR -->
<header>
  <div class="logo">SkillX</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Skills</a>
    <a href="#">Add Skill</a>
    <a href="#">Login</a>
  </nav>
</header>
<!-- HERO -->
<section class="hero">
  <h1>Learn & Exchange Skills</h1>
  <p>Join the community and grow your knowledge</p>
  <button class="btn-white" onclick="showMsg()">Get Started</button>
  <button class="btn-outline" onclick="exploreMsg()">Explore Skills</button>
  <p id="msg" style="margin-top:15px;"></p>
</section>
<!-- FEATURES -->
<section class="section">
  <h2>Features</h2>
  <div class="box-container">
    <div class="box">🎓 Learn Skills</div>
    <div class="box">👨‍🏫 Teach Skills</div>
    <div class="box">🤝 Exchange Skills</div>
    <div class="box">🌍 Global Community</div>
  </div>
</section>
<!-- SKILLS -->
<section class="section">
  <h2>Popular Skills</h2>
  <div class="skill-card" onclick="openPopup('HTML & CSS')">HTML & CSS</div>
  <div class="skill-card" onclick="openPopup('JavaScript')">JavaScript</div>
  <div class="skill-card" onclick="openPopup('Graphic Design')">Graphic Design</div>
</section>
<!-- POPUP -->
<div class="popup" id="popup">
  <h3 id="popupText"></h3>
  <button onclick="closePopup()">Close</button>
</div>
<!-- FOOTER -->
<footer>
  © 2026 Skill Exchange Platform | Built with ❤️
</footer>
<script>
/* Hero message */
function showMsg(){
  document.getElementById("msg").innerText =
    "Welcome to Skill Exchange Platform!";
}
function exploreMsg(){
  document.getElementById("msg").innerText =
    "Start exploring amazing skills today!";
}
/* Open popup */
function openPopup(skill){
  document.getElementById("popup").style.display = "block";
  document.getElementById("popupText").innerText =
    "Selected Skill: " + skill;
}

/* Close popup */
function closePopup(){
  document.getElementById("popup").style.display = "none";
}

</script>

</body>
</html>
