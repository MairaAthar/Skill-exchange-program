<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Profile | Skill Exchange</title>
<style>
/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}
body{
  background:#f4f6f9;
}
/* NAVBAR */
header{
  background:#2563eb;
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
}
.logo{
  font-size:20px;
  font-weight:bold;
}
nav a{
  color:white;
  margin:0 10px;
  text-decoration:none;
}
/* PROFILE CARD */
.profile-container{
  display:flex;
  justify-content:center;
  margin-top:40px;
}
.card{
  background:white;
  width:400px;
  padding:25px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  text-align:center;
}
/* PROFILE PIC */
.avatar{
  width:90px;
  height:90px;
  background:#2563eb;
  color:white;
  font-size:35px;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:50%;
  margin:0 auto 15px auto;
}
/* NAME */
h2{
  margin-bottom:5px;
}
.edit-btn{
  background:#2563eb;
  color:white;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  cursor:pointer;
  margin-top:10px;
}
/* ABOUT */
.about{
  margin-top:15px;
  color:#555;
  font-size:14px;
}
/* SKILLS */
.skills{
  margin-top:20px;
  text-align:left;
}
.skills h3{
  color:#2563eb;
  margin-bottom:10px;
}
.skill-item{
  background:#f1f5ff;
  padding:8px;
  margin:5px 0;
  border-radius:6px;
  font-size:14px;
}
.add-skill{
  margin-top:15px;
}
.add-skill input{
  width:70%;
  padding:8px;
  border:1px solid #ccc;
  border-radius:6px;
}
.add-skill button{
  padding:8px 10px;
  border:none;
  background:#2563eb;
  color:white;
  border-radius:6px;
  cursor:pointer;
}
/* FOOTER */
footer{
  margin-top:40px;
  background:#2563eb;
  color:white;
  text-align:center;
  padding:15px;
}
</style>
</head>
<body>
<!-- NAVBAR -->
<header>
  <div class="logo">SkillX</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="browse-skills.html">Skills</a>
    <a href="profile.html">Profile</a>
  </nav>
</header>
<!-- PROFILE -->
<div class="profile-container">
  <div class="card">
    <div class="avatar" id="avatar">A</div>
    <!-- Name -->
    <h2 id="name">Your Name </h2>
    <button class="edit-btn" onclick="editName()">Edit Name</button>
    <!-- ABOUT -->
    <div class="about">
      Passionate learner & teacher. I love sharing skills and learning new technologies.
    </div>
    <!-- SKILLS -->
    <div class="skills">
      <h3>My Skills</h3>
      <div id="skillList">
        <div class="skill-item">HTML</div>
        <div class="skill-item">CSS</div>
        <div class="skill-item">JavaScript</div>
      </div>
      <!-- ADD SKILL -->
      <div class="add-skill">
        <input type="text" id="newSkill" placeholder="Add new skill">
        <button onclick="addSkill()">Add</button>
      </div>
    </div>
  </div>
</div>
<footer>
  © 2026 Skill Exchange Platform
</footer>
<script>
/* EDIT NAME */
function editName(){
  let newName = prompt("Enter your new name:");
  if(newName !== null && newName !== ""){
    document.getElementById("name").innerText = newName;
    // change avatar first letter
    document.getElementById("avatar").innerText = newName.charAt(0).toUpperCase();
  }
}
/* ADD SKILL */
function addSkill(){
  let skillInput = document.getElementById("newSkill");
  let skillValue = skillInput.value;
  if(skillValue === ""){
    alert("Please enter a skill");
    return;
  }

  let div = document.createElement("div");
  div.className = "skill-item";
  div.innerText = skillValue;

  document.getElementById("skillList").appendChild(div);

  skillInput.value = "";
}

</script>

</body>
</html>
